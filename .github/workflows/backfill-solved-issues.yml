name: Backfill Solved Issues

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/scripts/create-solved-issues.sh
      - .github/workflows/backfill-solved-issues.yml

permissions:
  contents: read
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for label in "solved:0E8A16:Work completed and merged" "enhancement:a2eeef:New feature or request" "documentation:0075ca:Improvements or additions to documentation" "chore:fef2c0:Maintenance and housekeeping"; do
            name="${label%%:*}"
            rest="${label#*:}"
            color="${rest%%:*}"
            desc="${rest#*:}"
            gh label create "$name" --repo "${{ github.repository }}" --color "$color" --description "$desc" 2>/dev/null || true
          done

      - name: Create, assign, and close solved issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/create-solved-issues.sh
