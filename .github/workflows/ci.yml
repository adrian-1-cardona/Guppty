# =============================================================================
# CI — runs cargo test on every push and pull request
# =============================================================================
# If tests fail here, something broke before it hits main. Good safety net!
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --verbose

      # -----------------------------------------------------------------------
      # Dual-backend check: run every example BOTH ways and make sure they
      # print the same thing. Guppty has two engines — the fast "VM" (the
      # default) and the simple "interpreter" (turned on with --interp).
      # The same program MUST behave the same on both. This step is the lock
      # on that promise, so neither engine can quietly change the rules.
      # (It is its own step so you can spot it easily in the CI log.)
      # -----------------------------------------------------------------------
      - name: Lock semantics — examples must match on VM and --interp
        run: cargo test --test dual_backend -- --nocapture

      - name: Build release binary
        run: cargo build --release
