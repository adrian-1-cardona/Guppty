# =============================================================================
# CI — runs cargo test on every push and pull request
# =============================================================================
# If tests fail here, something broke before it hits main. Good safety net!
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --verbose

      - name: Build release binary
        run: cargo build --release
